<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropData — Profile Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script>sessionStorage.setItem('role','admin');sessionStorage.setItem('userName','James Carter');sessionStorage.setItem('userInitials','JC');</script>
  <script src="js/auth.js"></script>
  <style>
    .profile-nav-list {
      display: flex; flex-direction: column;
      background: white; border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-xl); overflow: hidden;
    }
    .profile-nav-item {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      text-decoration: none; color: inherit;
      border-bottom: 1px solid var(--color-neutral-100);
      transition: background 150ms ease; cursor: pointer;
    }
    .profile-nav-item:last-child { border-bottom: none; }
    .profile-nav-item:hover { background: var(--color-neutral-50); }
    .profile-nav-icon {
      width: 36px; height: 36px; border-radius: var(--radius-lg);
      background: var(--color-neutral-100); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; color: var(--color-neutral-600);
    }
    .profile-nav-text { flex: 1; }
    .profile-nav-label { font-size: 14px; font-weight: 600; color: var(--color-neutral-900); }
    .profile-nav-value { font-size: 12px; color: var(--color-neutral-500); margin-top: 2px; }
    .profile-nav-chevron { color: var(--color-neutral-400); flex-shrink: 0; }

    .profile-avatar-row {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-5) var(--space-5) var(--space-5);
    }
    .profile-avatar-lg {
      width: 64px; height: 64px; border-radius: var(--radius-full);
      background: var(--color-primary-500); display: flex; align-items: center;
      justify-content: center; font-size: 22px; font-weight: 700; color: white;
      flex-shrink: 0;
    }
    .profile-avatar-name { font-size: 18px; font-weight: 700; color: var(--color-neutral-900); }
    .profile-avatar-email { font-size: 13px; color: var(--color-neutral-500); margin-top: 2px; }
  </style>
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="app-header__inner">
      <div style="display:flex; align-items:center; gap:var(--space-4);">
        <a href="orders.html" class="btn btn-outline btn-sm">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </a>
        <h1 style="font-size:var(--font-size-2xl); font-weight:var(--font-weight-semibold); color:var(--color-neutral-900);">Account Settings</h1>
      </div>
      <a href="orders.html" class="overlay-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
  </header>

  <main class="app-main" style="background:var(--color-neutral-50);">
    <div style="max-width:560px; margin:0; padding:var(--space-6) 0; display:flex; flex-direction:column; gap:var(--space-4);">

      <!-- Avatar + name block -->
      <div style="background:white; border:1px solid var(--color-neutral-200); border-radius:var(--radius-xl);">
        <div class="profile-avatar-row">
          <div class="profile-avatar-lg" id="overviewAvatar">JC</div>
          <div>
            <div class="profile-avatar-name" id="overviewName">James Carter</div>
            <div class="profile-avatar-email" id="overviewEmail">admin@propdata.com</div>
          </div>
        </div>
      </div>

      <!-- Navigation rows -->
      <div class="profile-nav-list">

        <a href="profile-personal.html" class="profile-nav-item">
          <div class="profile-nav-icon">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3.5" stroke="currentColor" stroke-width="1.5"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="profile-nav-text">
            <div class="profile-nav-label">Personal info</div>
            <div class="profile-nav-value">Name, photo</div>
          </div>
          <svg class="profile-nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>

        <a href="profile-security.html" class="profile-nav-item">
          <div class="profile-nav-icon">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="4" y="9" width="12" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 9V6a3 3 0 0 1 6 0v3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="profile-nav-text">
            <div class="profile-nav-label">Security</div>
            <div class="profile-nav-value">Email, phone, password</div>
          </div>
          <svg class="profile-nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>

        <a href="profile-payments.html" class="profile-nav-item">
          <div class="profile-nav-icon">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="2" y="5" width="16" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M2 9h16" stroke="currentColor" stroke-width="1.5"/></svg>
          </div>
          <div class="profile-nav-text">
            <div class="profile-nav-label">Payment methods</div>
            <div class="profile-nav-value">Visa ••••4242</div>
          </div>
          <svg class="profile-nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>

      </div>

      <!-- Sign out — separated -->
      <div class="profile-nav-list" style="margin-top:var(--space-4);">
        <button class="profile-nav-item" onclick="logout()" style="width:100%; background:none; border:none; font-family:inherit; text-align:left;">
          <div class="profile-nav-icon" style="background:var(--color-error-50); color:var(--color-error-500);">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M7 3H4a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h3M13 14l4-4-4-4M17 10H8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="profile-nav-text">
            <div class="profile-nav-label" style="color:var(--color-error-500);">Sign out</div>
          </div>
        </button>
      </div>

    </div>
  </main>

</div>

<script>
initPage({ requireAdmin: false });
setTimeout(logout, 400);
const name = sessionStorage.getItem('userName') || 'James Carter';
const initials = sessionStorage.getItem('userInitials') || 'JC';
document.getElementById('overviewName').textContent = name;
document.getElementById('overviewAvatar').textContent = initials;
</script>

</body>
</html>

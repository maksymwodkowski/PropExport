<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropData — Corporate Settings</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script>sessionStorage.setItem('role','admin');sessionStorage.setItem('userName','James Carter');sessionStorage.setItem('userInitials','JC');</script>
  <script src="js/auth.js"></script>
  <style>
    .corp-nav-list {
      display: flex; flex-direction: column;
      background: white; border: 1px solid var(--color-neutral-200);
      border-radius: var(--radius-xl); overflow: hidden;
    }
    .corp-nav-item {
      display: flex; align-items: center; gap: var(--space-4);
      padding: var(--space-4) var(--space-5);
      text-decoration: none; color: inherit;
      border-bottom: 1px solid var(--color-neutral-100);
      transition: background 150ms ease;
    }
    .corp-nav-item:last-child { border-bottom: none; }
    .corp-nav-item:hover { background: var(--color-neutral-50); }
    .corp-nav-icon {
      width: 36px; height: 36px; border-radius: var(--radius-lg);
      background: var(--color-neutral-100); display: flex; align-items: center;
      justify-content: center; flex-shrink: 0; color: var(--color-neutral-600);
    }
    .corp-nav-text { flex: 1; }
    .corp-nav-label { font-size: 14px; font-weight: 600; color: var(--color-neutral-900); }
    .corp-nav-value { font-size: 12px; color: var(--color-neutral-500); margin-top: 2px; }
    .corp-nav-chevron { color: var(--color-neutral-400); flex-shrink: 0; }
  </style>
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="app-header__inner">
      <div style="display:flex; align-items:center; gap:var(--space-4);">
        <a href="orders.html" class="btn btn-outline btn-sm">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </a>
        <h1 style="font-size:var(--font-size-2xl); font-weight:var(--font-weight-semibold); color:var(--color-neutral-900);">Corporate Settings</h1>
      </div>
      <a href="orders.html" class="overlay-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
  </header>

  <main class="app-main" style="background:var(--color-neutral-50);">
    <div style="max-width:560px; margin:0; padding:var(--space-6) 0; display:flex; flex-direction:column; gap:var(--space-4);">

      <div class="corp-nav-list">

        <a href="settings-corporate-identity.html" class="corp-nav-item">
          <div class="corp-nav-icon">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><rect x="3" y="5" width="14" height="10" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M7 10h6M7 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="corp-nav-text">
            <div class="corp-nav-label">Company Identity</div>
            <div class="corp-nav-value">Name, logo</div>
          </div>
          <svg class="corp-nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>

        <a href="settings-corporate-color.html" class="corp-nav-item">
          <div class="corp-nav-icon">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 3v7l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </div>
          <div class="corp-nav-text">
            <div class="corp-nav-label">Brand Color</div>
            <div class="corp-nav-value">Primary color, presets</div>
          </div>
          <svg class="corp-nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>

        <a href="settings-corporate-api.html" class="corp-nav-item">
          <div class="corp-nav-icon">
            <svg width="18" height="18" viewBox="0 0 20 20" fill="none"><path d="M7 8l-4 4 4 4M13 8l4 4-4 4M11 4l-2 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="corp-nav-text">
            <div class="corp-nav-label">API Settings</div>
            <div class="corp-nav-value">Token, datasets, integrations</div>
          </div>
          <svg class="corp-nav-chevron" width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M6 4l4 4-4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>

      </div>

    </div>
  </main>

</div>

<script>
initPage({ requireAdmin: true });
</script>

</body>
</html>

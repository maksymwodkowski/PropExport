<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropData — Personal Info</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script>sessionStorage.setItem('role','admin');sessionStorage.setItem('userName','James Carter');sessionStorage.setItem('userInitials','JC');</script>
  <script src="js/auth.js"></script>
  <style>
    .avatar-upload { display: flex; align-items: center; gap: var(--space-6); }
    .avatar-preview {
      width: 80px; height: 80px; border-radius: var(--radius-full);
      background: var(--color-primary-500); display: flex; align-items: center;
      justify-content: center; font-size: 28px; font-weight: 700; color: white;
      letter-spacing: -0.02em; flex-shrink: 0; overflow: hidden; position: relative;
    }
    .avatar-actions { display: flex; flex-direction: column; gap: var(--space-2); }
    .field-row { display: flex; gap: var(--space-4); }
    .field-row > * { flex: 1; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="app-header__inner">
      <div style="display:flex; align-items:center; gap:var(--space-4);">
        <a href="profile.html" class="btn btn-outline btn-sm">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </a>
        <h1 style="font-size:var(--font-size-2xl); font-weight:var(--font-weight-semibold); color:var(--color-neutral-900);">Personal info</h1>
      </div>
      <a href="orders.html" class="overlay-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
  </header>

  <main class="app-main" style="background:var(--color-neutral-50);">
    <div style="max-width:560px; margin:0; padding:var(--space-6) 0; display:flex; flex-direction:column; gap:var(--space-4);">

      <div class="settings-section">
        <div class="settings-section__body">

          <div class="avatar-upload">
            <div class="avatar-preview" id="avatarPreview">
              <span id="avatarInitials">JC</span>
            </div>
            <div class="avatar-actions">
              <button class="btn btn-outline btn-sm" onclick="simulateAvatarUpload()">Upload photo</button>
              <button class="btn btn-ghost btn-sm" id="removeAvatarBtn" style="display:none; color:var(--color-error-500)" onclick="removeAvatar()">Remove photo</button>
              <p style="font-size:11px; color:var(--color-neutral-400);">JPG or PNG · Max 5MB</p>
            </div>
          </div>

          <div class="field-row">
            <div>
              <label class="form-label" for="firstName">First name</label>
              <input type="text" id="firstName" class="input input-filled" value="James" />
            </div>
            <div>
              <label class="form-label" for="lastName">Last name</label>
              <input type="text" id="lastName" class="input input-filled" value="Carter" />
            </div>
          </div>

          <div>
            <label class="form-label" for="displayName">Display name</label>
            <input type="text" id="displayName" class="input input-filled" value="James Carter" />
            <p style="font-size:12px; color:var(--color-neutral-400); margin-top:6px;">Shown in the navigation bar.</p>
          </div>

        </div>
      </div>

    </div>
  </main>

  <footer class="action-bar">
    <div class="action-bar__inner">
      <p class="action-bar__hint"></p>
      <div style="display:flex; gap:var(--space-3);">
        <button class="btn btn-outline btn-md" onclick="history.back()">Discard</button>
        <button class="btn btn-primary btn-md" onclick="savePersonal()">Save changes</button>
      </div>
    </div>
  </footer>

</div>

<!-- Toast -->
<div id="toast" style="
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--color-neutral-900); color:white; padding:12px 20px;
  border-radius:var(--radius-lg); font-size:13px; font-weight:500;
  box-shadow:var(--shadow-lg); transition:transform 300ms ease; z-index:600;
  display:flex; align-items:center; gap:8px; white-space:nowrap;
">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3 3L13 4.5" stroke="#10B981" stroke-width="2" stroke-linecap="round"/></svg>
  <span id="toastMsg">Changes saved</span>
</div>

<script>
initPage({ requireAdmin: false });

const initials = sessionStorage.getItem('userInitials') || 'JC';
document.getElementById('avatarInitials').textContent = initials;

function simulateAvatarUpload() {
  const preview = document.getElementById('avatarPreview');
  document.getElementById('avatarInitials').style.display = 'none';
  preview.style.background = '#1a1a2e';
  preview.innerHTML += '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;color:rgba(255,255,255,0.6);letter-spacing:0.1em;">PHOTO</div>';
  document.getElementById('removeAvatarBtn').style.display = '';
}
function removeAvatar() {
  const preview = document.getElementById('avatarPreview');
  const init = sessionStorage.getItem('userInitials') || 'JC';
  preview.innerHTML = '<span id="avatarInitials">' + init + '</span>';
  preview.style.background = 'var(--color-primary-500)';
  document.getElementById('removeAvatarBtn').style.display = 'none';
}
function savePersonal() {
  const name = document.getElementById('displayName').value || 'User';
  sessionStorage.setItem('userName', name);
  sessionStorage.setItem('userInitials', name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase());
  showToast('Personal info saved');
  setTimeout(() => history.back(), 1200);
}
function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(80px)'; }, 3000);
}
</script>

</body>
</html>

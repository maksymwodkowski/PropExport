<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PropData — Security</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=2" />
  <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
  <script>sessionStorage.setItem('role','admin');sessionStorage.setItem('userName','James Carter');sessionStorage.setItem('userInitials','JC');</script>
  <script src="js/auth.js"></script>
  <style>
    .field-row { display: flex; gap: var(--space-4); }
    .field-row > * { flex: 1; }
  </style>
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="app-header__inner">
      <div style="display:flex; align-items:center; gap:var(--space-4);">
        <a href="profile.html" class="btn btn-outline btn-sm">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back
        </a>
        <h1 style="font-size:var(--font-size-2xl); font-weight:var(--font-weight-semibold); color:var(--color-neutral-900);">Security</h1>
      </div>
      <a href="orders.html" class="overlay-close" aria-label="Close">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M4 4l8 8M12 4l-8 8" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/>
        </svg>
      </a>
    </div>
  </header>

  <main class="app-main" style="background:var(--color-neutral-50);">
    <div style="max-width:560px; margin:0; padding:var(--space-6) 0; display:flex; flex-direction:column; gap:var(--space-4);">

      <div class="settings-section">
        <div class="settings-section__header">
          <h2 class="settings-section__title">Contact</h2>
          <p class="settings-section__desc">Update your email address and phone number.</p>
        </div>
        <div class="settings-section__body">

          <div>
            <label class="form-label" for="secEmail">Email address</label>
            <div style="display:flex; gap:var(--space-3);">
              <input type="email" id="secEmail" class="input input-filled" value="admin@propdata.com" style="flex:1;" />
              <button class="btn btn-outline btn-md" onclick="saveField('email')">Update</button>
            </div>
          </div>

          <div>
            <label class="form-label" for="secPhone">Phone number</label>
            <div style="display:flex; gap:var(--space-3);">
              <input type="tel" id="secPhone" class="input input-filled" value="+1 (602) 555-0194" style="flex:1;" />
              <button class="btn btn-outline btn-md" onclick="saveField('phone')">Update</button>
            </div>
          </div>

        </div>
      </div>

      <div class="settings-section">
        <div class="settings-section__header">
          <h2 class="settings-section__title">Password</h2>
          <p class="settings-section__desc">Choose a strong password you don't use elsewhere.</p>
        </div>
        <div class="settings-section__body">

          <input type="password" id="currentPw" class="input input-filled" placeholder="Current password" />
          <div class="field-row">
            <input type="password" id="newPw" class="input input-filled" placeholder="New password" />
            <input type="password" id="confirmPw" class="input input-filled" placeholder="Confirm new password" />
          </div>
          <div id="pwError" class="alert alert--error" style="display:none;">
            <svg class="alert__icon" viewBox="0 0 18 18" fill="none"><path d="M9 3L2 15h14L9 3z" stroke="currentColor" stroke-width="1.5"/><path d="M9 8v3M9 13v.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span id="pwErrorMsg">Passwords do not match.</span>
          </div>
          <div>
            <button class="btn btn-outline btn-md" onclick="changePassword()">Change password</button>
          </div>

        </div>
      </div>

    </div>
  </main>

</div>

<!-- Toast -->
<div id="toast" style="
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
  background:var(--color-neutral-900); color:white; padding:12px 20px;
  border-radius:var(--radius-lg); font-size:13px; font-weight:500;
  box-shadow:var(--shadow-lg); transition:transform 300ms ease; z-index:600;
  display:flex; align-items:center; gap:8px; white-space:nowrap;
">
  <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><path d="M3 8.5l3 3L13 4.5" stroke="#10B981" stroke-width="2" stroke-linecap="round"/></svg>
  <span id="toastMsg">Saved</span>
</div>

<script>
initPage({ requireAdmin: false });

function saveField(field) {
  showToast(field === 'email' ? 'Email updated' : 'Phone number updated');
}
function changePassword() {
  const cur = document.getElementById('currentPw').value;
  const np  = document.getElementById('newPw').value;
  const cp  = document.getElementById('confirmPw').value;
  const err = document.getElementById('pwError');
  const msg = document.getElementById('pwErrorMsg');
  if (!cur || !np || !cp) { msg.textContent = 'Please fill in all password fields.'; err.style.display = 'flex'; return; }
  if (np !== cp)           { msg.textContent = 'New passwords do not match.';         err.style.display = 'flex'; return; }
  if (np.length < 8)       { msg.textContent = 'Password must be at least 8 characters.'; err.style.display = 'flex'; return; }
  err.style.display = 'none';
  ['currentPw','newPw','confirmPw'].forEach(id => document.getElementById(id).value = '');
  showToast('Password changed successfully');
}
function showToast(msg) {
  document.getElementById('toastMsg').textContent = msg;
  const t = document.getElementById('toast');
  t.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { t.style.transform = 'translateX(-50%) translateY(80px)'; }, 3000);
}
</script>

</body>
</html>
